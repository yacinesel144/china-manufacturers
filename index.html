<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>China Manufacturers — Trip Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f8ef7;
      --accent2: #f7934f;
      --text: #e8eaf6;
      --muted: #7b82a8;
      --green: #4caf82;
      --red: #f76d6d;
      --yellow: #f7d14f;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* ── TOP BAR ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { font-size: 26px; }
    .logo h1 { font-size: 18px; font-weight: 700; color: var(--text); }
    .logo p { font-size: 12px; color: var(--muted); }
    .stats-bar { display: flex; gap: 24px; }
    .stat { text-align: center; }
    .stat .num { font-size: 22px; font-weight: 800; color: var(--accent); }
    .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

    /* ── CONTROLS ── */
    .controls {
      padding: 16px 28px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .search-box {
      flex: 1;
      min-width: 220px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--muted); }
    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }
    .show-deleted-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      user-select: none;
      transition: border-color .15s;
    }
    .show-deleted-label:hover { border-color: var(--red); color: var(--red); }
    .show-deleted-label input { accent-color: var(--red); cursor: pointer; }
    .view-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 3px;
    }
    .view-tab {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      transition: all .15s;
    }
    .view-tab.active { background: var(--accent); color: #fff; font-weight: 600; }

    /* ── MAIN LAYOUT ── */
    .main { padding: 24px 28px; }

    /* ── CITY VIEW ── */
    .city-region { margin-bottom: 32px; }
    .region-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .city-grid { display: flex; flex-direction: column; gap: 16px; }
    .city-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .city-header {
      background: var(--surface2);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }
    .city-header:hover { background: #2a2e48; }
    .city-name { font-weight: 700; font-size: 15px; }
    .city-count {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .city-cats { display: flex; gap: 6px; flex-wrap: wrap; }
    .cat-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    /* ── MANUFACTURER CARDS ── */
    .mfr-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .mfr-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color .15s;
    }
    .mfr-card:hover { border-color: var(--accent); }
    .mfr-card.is-deleted {
      opacity: 0.45;
      border-color: var(--red);
      border-style: dashed;
    }
    .mfr-card.has-visit { border-left: 3px solid var(--green); }
    /* top row: info + link buttons side by side */
    .mfr-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }
    .mfr-links { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
    /* bottom row: action buttons in a horizontal strip */
    .mfr-bottom-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .mfr-bottom-actions .status-inline-label { margin-right: auto; }
    .mfr-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .mfr-meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 6px; }
    .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
    .badge-cat { background: #1e2d5a; color: #7aabff; border: 1px solid #2e4080; }
    .badge-moq { background: #1e3d2a; color: #6fd4a1; border: 1px solid #2e6040; }
    .badge-price { background: #3d2a1e; color: #f4b06d; border: 1px solid #80502e; }
    .badge-gold { background: #3d3510; color: #f7d14f; border: 1px solid #806c1a; }
    .badge-visit { background: #1a3d2a; color: #4caf82; border: 1px solid #2e6040; }
    .mfr-details { display: none; margin-top: 8px; }
    .mfr-details.open { display: block; }
    .btn-readmore {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      margin-top: 5px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      transition: color .15s;
    }
    .btn-readmore:hover { color: var(--accent); }
    .mfr-notes { font-size: 12px; color: var(--muted); margin-top: 5px; font-style: italic; }
    .btn-link {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    .btn-link:hover { background: var(--border); }
    .btn-contact {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid;
      cursor: pointer;
      font-weight: 600;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn-contact.not-contacted { background: #1e2d5a; border-color: #2e4080; color: #7aabff; }
    .btn-contact.not-contacted:hover { background: #2a3d7a; border-color: var(--accent); color: #fff; }
    .btn-contact.is-contacted { background: #3d3510; border-color: #806c1a; color: var(--yellow); }
    .btn-contact.is-contacted:hover { background: #4d4515; border-color: var(--yellow); }

    /* ── SCHEDULE / CALENDAR BUTTON ── */
    .btn-schedule {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #1a4030;
      background: #112a1e;
      color: #4caf82;
      cursor: pointer;
      font-weight: 600;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn-schedule:hover { background: #1a3d2a; border-color: var(--green); color: #fff; }
    .btn-schedule.has-event { background: #1a3d2a; border-color: var(--green); color: var(--green); }
    .btn-schedule.has-event:hover { background: var(--green); color: #000; }

    .btn-delete {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid #4a2020;
      background: #2a1515;
      color: #a05050;
      cursor: pointer;
      transition: all .15s;
      font-weight: 600;
    }
    .btn-delete:hover { background: #3a1f1f; border-color: var(--red); color: var(--red); }
    .btn-restore {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid #4a2020;
      background: #2a1515;
      color: var(--red);
      cursor: pointer;
      transition: all .15s;
      font-weight: 600;
    }
    .btn-restore:hover { background: var(--red); color: #fff; border-color: var(--red); }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 4px;
    }
    .status-dot.contacted { background: var(--yellow); }
    .status-dot.scheduled  { background: var(--green); }
    .status-dot.new        { background: var(--accent); }
    .status-dot.rejected   { background: var(--red); }

    /* ── CATEGORY VIEW ── */
    .cat-section { margin-bottom: 32px; }
    .cat-section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .cat-icon { font-size: 22px; }
    .cat-title { font-size: 18px; font-weight: 700; }
    .cat-divider { flex: 1; height: 1px; background: var(--border); }
    .cat-count { color: var(--muted); font-size: 13px; }
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }
    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      transition: border-color .15s;
    }
    .cat-card:hover { border-color: var(--accent); }
    .cat-card .mfr-name { font-size: 14px; }
    .cat-card .city-label { font-size: 12px; color: var(--accent2); margin-bottom: 6px; font-weight: 600; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .big-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; line-height: 1.6; max-width: 380px; margin: 0 auto; }

    /* ── ITINERARY BAR ── */
    .itinerary-bar {
      background: linear-gradient(135deg, #1a2550 0%, #1e1a40 100%);
      border: 1px solid #3040a0;
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .itinerary-bar .icon { font-size: 24px; }
    .itinerary-bar h3 { font-size: 14px; font-weight: 700; }
    .itinerary-bar p { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── SCHEDULE MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: 440px;
      max-width: 95vw;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
      position: relative;
    }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }
    .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-info {
      background: var(--surface2);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .modal-info strong { color: var(--text); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cal {
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }
    .btn-cal:hover { opacity: .85; }
    .btn-cal-primary { background: #1a73e8; color: #fff; }
    .btn-cal-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
    .visit-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--green);
      background: #1a3d2a;
      border: 1px solid #2e6040;
      border-radius: 20px;
      padding: 2px 8px;
      font-weight: 600;
      margin-top: 6px;
    }

    /* ── MAP VIEW ── */
    #map-container {
      display: none;
      height: calc(100vh - 132px);
      position: relative;
    }
    #map-container.active { display: block; }
    #map { width: 100%; height: 100%; }
    /* Override Leaflet popup defaults to match dark theme */
    .leaflet-popup-content-wrapper {
      background: #1a1d27;
      color: #e8eaf6;
      border: 1px solid #2e3350;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    .leaflet-popup-tip { background: #1a1d27; }
    .leaflet-popup-content { margin: 14px 16px; }
    .map-popup-city {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2e3350;
      color: #e8eaf6;
    }
    .map-popup-mfr {
      background: #22263a;
      border-radius: 7px;
      padding: 9px 11px;
      margin-bottom: 7px;
    }
    .map-popup-mfr:last-child { margin-bottom: 0; }
    .map-popup-name { font-weight: 600; font-size: 13px; color: #e8eaf6; }
    .map-popup-cat { font-size: 11px; color: #7b82a8; margin-top: 2px; }
    .map-popup-row { display: flex; gap: 8px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
    .map-popup-badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 20px;
    }
    .map-popup-link {
      font-size: 11px;
      color: #4f8ef7;
      text-decoration: none;
      margin-left: auto;
    }
    .map-popup-link:hover { text-decoration: underline; }
    .map-pin-no-location {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 13px;
      color: var(--muted);
      margin: 24px 28px;
    }

    [title] { cursor: help; }
    @media (max-width: 640px) {
      header { flex-direction: column; gap: 12px; }
      .stats-bar { justify-content: center; }
      .main { padding: 16px; }
    }
    .hidden { display: none !important; }
    .collapsed .mfr-list { display: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🇨🇳</div>
    <div>
      <h1>China Manufacturers Tracker</h1>
      <p id="last-updated">Loading…</p>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="num" id="stat-total">0</div><div class="label">Total</div></div>
    <div class="stat"><div class="num" id="stat-cities">0</div><div class="label">Cities</div></div>
    <div class="stat"><div class="num" id="stat-cats">0</div><div class="label">Categories</div></div>
    <div class="stat"><div class="num" id="stat-contacted">0</div><div class="label">Contacted</div></div>
    <div class="stat"><div class="num" id="stat-scheduled">0</div><div class="label">Scheduled</div></div>
  </div>
</header>

<div class="controls">
  <input class="search-box" type="text" id="search" placeholder="Search by name, city, product…" />
  <select id="filter-cat">
    <option value="">All Categories</option>
  </select>
  <select id="filter-status">
    <option value="">All Statuses</option>
    <option value="new">New</option>
    <option value="contacted">Contacted</option>
    <option value="visit-scheduled">Visit Scheduled</option>
    <option value="rejected">Rejected</option>
  </select>
  <label class="show-deleted-label">
    <input type="checkbox" id="show-deleted" onchange="render()" />
    Show deleted
  </label>
  <div class="view-tabs">
    <button class="view-tab active" data-view="city" onclick="switchView('city', this)">By City</button>
    <button class="view-tab" data-view="category" onclick="switchView('category', this)">By Category</button>
    <button class="view-tab" data-view="map" onclick="switchView('map', this)">🗺 Map</button>
  </div>
</div>

<div id="map-container">
  <div id="map-no-coords-warn" class="map-pin-no-location" style="display:none;position:absolute;z-index:999;bottom:12px;left:50%;transform:translateX(-50%);white-space:nowrap;"></div>
  <div id="map"></div>
</div>
<div class="main" id="main-content"></div>

<!-- ── SCHEDULE MODAL ── -->
<div class="modal-overlay" id="schedule-modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-mfr-name">Schedule Factory Visit</div>
        <div class="modal-subtitle" id="modal-mfr-city"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="modal-info" id="modal-mfr-info"></div>

    <div class="form-group">
      <label class="form-label" for="visit-date">Visit date</label>
      <input class="form-input" type="date" id="visit-date" />
    </div>
    <div class="time-row form-group">
      <div>
        <label class="form-label" for="visit-start">Start time</label>
        <input class="form-input" type="time" id="visit-start" value="09:00" />
      </div>
      <div>
        <label class="form-label" for="visit-end">End time</label>
        <input class="form-input" type="time" id="visit-end" value="11:00" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="visit-notes">Extra notes (optional)</label>
      <textarea class="form-input" id="visit-notes" rows="2" placeholder="e.g. Ask about bulk pricing, request samples…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cal btn-cal-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-cal btn-cal-primary" onclick="openGoogleCalendar()">📅 Open in Google Calendar</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const CATEGORY_ICONS = {
  "Sportswear": "⚽", "Footwear": "👟", "Accessories": "🧢",
  "Training Equipment": "🏋️", "Marine / Boats": "⛵", "Electric Vehicles": "⚡",
  "Motorcycles": "🏍️", "Quads / ATVs": "🛺", "Prefab Homes": "🏠", "Other": "📦"
};
const STATUS_LABELS = {
  new: "New", contacted: "Contacted", scheduled: "Visit Scheduled", rejected: "Rejected"
};

const LS_CONTACTED = 'mfr_contacted';
const LS_DELETED   = 'mfr_deleted';
const LS_VISITS    = 'mfr_visits'; // { [id]: { date, start, end, notes } }

// City → [lat, lng] for all cities in the dataset
const CITY_COORDS = {
  // Pearl River Delta — Guangdong
  'Guangzhou':  [23.1291, 113.2644],
  'Shenzhen':   [22.5431, 114.0579],
  'Dongguan':   [23.0489, 113.7447],
  'Foshan':     [23.0220, 113.1220],
  'Zhuhai':     [22.2710, 113.5767],
  // Fujian
  'Quanzhou':   [24.8741, 118.6757],
  'Jinjiang':   [24.7819, 118.5521],
  'Xiamen':     [24.4798, 118.0894],
  'Fuzhou':     [26.0745, 119.2965],
  // Zhejiang

let allData = null;
let currentView = 'city';
let filters = { search: '', cat: '', status: '' };
let modalMfr = null;
let leafletMap = null;
let markerLayer = null;

// ── localStorage helpers ────────────────────────────────────────────────────

function lsGetSet(key) {
  try { return new Set(JSON.parse(localStorage.getItem(key) || '[]')); }
  catch { return new Set(); }
}
function lsSaveSet(key, set) {
  localStorage.setItem(key, JSON.stringify([...set]));
}
function lsGetObj(key) {
  try { return JSON.parse(localStorage.getItem(key) || '{}'); }
  catch { return {}; }
}
function lsSaveObj(key, obj) {
  localStorage.setItem(key, JSON.stringify(obj));
}

function isContacted(id) { return lsGetSet(LS_CONTACTED).has(id); }
function isDeleted(id)   { return lsGetSet(LS_DELETED).has(id); }
function getVisit(id)    { return lsGetObj(LS_VISITS)[id] || null; }

function toggleContacted(id) {
  const set = lsGetSet(LS_CONTACTED);
  set.has(id) ? set.delete(id) : set.add(id);
  lsSaveSet(LS_CONTACTED, set);
  const card = document.querySelector(`[data-mfr-id="${id}"]`);
  if (!card) return;
  const contacted = set.has(id);
  const btn = card.querySelector('.btn-contact');
  const dot = card.querySelector('.status-dot');
  const lbl = card.querySelector('.status-inline-label');
  if (btn) { btn.textContent = contacted ? '✓ Contacted' : '✉ Mark contacted'; btn.className = 'btn-contact ' + (contacted ? 'is-contacted' : 'not-contacted'); }
  if (dot) dot.className = 'status-dot ' + (contacted ? 'contacted' : 'new');
  if (lbl) { lbl.textContent = contacted ? 'Contacted' : 'New'; lbl.style.color = contacted ? 'var(--yellow)' : 'var(--accent)'; }
  updateStats();
}

function toggleDelete(id) {
  const set = lsGetSet(LS_DELETED);
  set.has(id) ? set.delete(id) : set.add(id);
  lsSaveSet(LS_DELETED, set);
  render();
}

// ── Schedule modal ──────────────────────────────────────────────────────────

function openScheduleModal(id) {
  const m = allData.manufacturers.find(x => x.id === id);
  if (!m) return;
  modalMfr = m;

  document.getElementById('modal-mfr-name').textContent = m.name;
  document.getElementById('modal-mfr-city').textContent = `📍 ${m.city}${m.province ? ', ' + m.province : ''}, China`;

  const parts = [];
  if (m.category) parts.push(`Category: ${m.category}`);
  if (m.products) parts.push(`Products: ${m.products}`);
  if (m.moq) parts.push(`MOQ: ${m.moq}`);
  if (m.priceRange) parts.push(`Price: ${m.priceRange}`);
  document.getElementById('modal-mfr-info').innerHTML = parts.map(p => `<strong>${p.split(':')[0]}:</strong>${p.slice(p.indexOf(':'))}`).join(' &nbsp;·&nbsp; ');

  // Pre-fill from saved visit if any
  const saved = getVisit(id);
  document.getElementById('visit-date').value  = saved?.date  || '';
  document.getElementById('visit-start').value = saved?.start || '09:00';
  document.getElementById('visit-end').value   = saved?.end   || '11:00';
  document.getElementById('visit-notes').value = saved?.notes || '';

  document.getElementById('schedule-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('schedule-modal').classList.remove('open');
  modalMfr = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('schedule-modal')) closeModal();
}

function openGoogleCalendar() {
  if (!modalMfr) return;
  const date  = document.getElementById('visit-date').value;
  const start = document.getElementById('visit-start').value;
  const end   = document.getElementById('visit-end').value;
  const notes = document.getElementById('visit-notes').value.trim();

  if (!date) { document.getElementById('visit-date').focus(); return; }

  // Save to localStorage so the badge appears on the card
  const visits = lsGetObj(LS_VISITS);
  visits[modalMfr.id] = { date, start, end, notes };
  lsSaveObj(LS_VISITS, visits);

  // Build Google Calendar URL (YYYYMMDDTHHMMSS format, no dashes/colons)
  const fmt = (d, t) => `${d.replace(/-/g, '')}T${t.replace(/:/g, '')}00`;
  const startFmt = fmt(date, start);
  const endFmt   = fmt(date, end);

  const title = encodeURIComponent(`Factory Visit: ${modalMfr.name}`);
  const location = encodeURIComponent(`${modalMfr.city}${modalMfr.province ? ', ' + modalMfr.province : ''}, China`);

  let details = `Factory visit — ${modalMfr.category}`;
  if (modalMfr.products) details += `\nProducts: ${modalMfr.products}`;
  if (modalMfr.moq)      details += `\nMOQ: ${modalMfr.moq}`;
  if (modalMfr.priceRange) details += `\nPrice range: ${modalMfr.priceRange}`;
  if (modalMfr.alibabaUrl) details += `\nAlibaba: ${modalMfr.alibabaUrl}`;
  if (notes) details += `\n\nNotes: ${notes}`;
  const detailsEnc = encodeURIComponent(details);

  const calUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${startFmt}/${endFmt}&location=${location}&details=${detailsEnc}`;
  window.open(calUrl, '_blank');

  closeModal();
  render(); // refresh badges
}

// ── Data loading ────────────────────────────────────────────────────────────

async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    allData = await res.json();
    init();
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div class="empty-state"><div class="big-icon">⚠️</div><h2>Could not load data.json</h2><p>Make sure data.json is in the same folder as this HTML file.</p></div>`;
  }
}

function init() {
  const sel = document.getElementById('filter-cat');
  allData.categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = `${CATEGORY_ICONS[c] || '📦'} ${c}`;
    sel.appendChild(opt);
  });
  document.getElementById('search').addEventListener('input', e => { filters.search = e.target.value.toLowerCase(); render(); });
  document.getElementById('filter-cat').addEventListener('change', e => { filters.cat = e.target.value; render(); });
  document.getElementById('filter-status').addEventListener('change', e => { filters.status = e.target.value; render(); });
  updateStats();
  render();
  document.getElementById('last-updated').textContent = `Trip owner: ${allData.meta.tripOwner} · Last updated: ${allData.meta.lastUpdated}`;
}

function getFiltered() {
  const showDeleted = document.getElementById('show-deleted')?.checked;
  return allData.manufacturers.filter(m => {
    if (!showDeleted && isDeleted(m.id)) return false;
    const effectiveStatus = getVisit(m.id) ? 'visit-scheduled' : isContacted(m.id) ? 'contacted' : m.status;
    if (filters.search && !JSON.stringify(m).toLowerCase().includes(filters.search)) return false;
    if (filters.cat && m.category !== filters.cat) return false;
    if (filters.status && effectiveStatus !== filters.status) return false;
    return true;
  });
}

function updateStats() {
  if (!allData) return;
  const visible = allData.manufacturers.filter(m => !isDeleted(m.id));
  document.getElementById('stat-total').textContent     = visible.length;
  document.getElementById('stat-cities').textContent    = new Set(visible.map(m => m.city)).size;
  document.getElementById('stat-cats').textContent      = new Set(visible.map(m => m.category)).size;
  document.getElementById('stat-contacted').textContent = visible.filter(m => isContacted(m.id) || m.status === 'contacted').length;
  document.getElementById('stat-scheduled').textContent = visible.filter(m => getVisit(m.id)).length;
}

function switchView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const mapContainer  = document.getElementById('map-container');
  const mainContainer = document.getElementById('main-content');

  if (currentView === 'map') {
    mainContainer.style.display = 'none';
    mapContainer.classList.add('active');
    renderMapView();
    updateStats();
    return;
  }

  mapContainer.classList.remove('active');
  mainContainer.style.display = '';

  const filtered = getFiltered();
  if (allData.manufacturers.length === 0) {
    mainContainer.innerHTML = `<div class="empty-state"><div class="big-icon">🗺️</div><h2>No manufacturers yet</h2><p>Paste an Alibaba listing URL to Claude Code and it will automatically extract and sort the manufacturer info here.</p></div>`;
    return;
  }
  if (filtered.length === 0) {
    mainContainer.innerHTML = `<div class="empty-state"><div class="big-icon">🔍</div><h2>No matches</h2><p>Try adjusting your search or filters.</p></div>`;
    return;
  }
  if (currentView === 'city') renderCityView(filtered, mainContainer);
  else renderCategoryView(filtered, mainContainer);
  updateStats();
}

function renderMapView() {
  const filtered = getFiltered();

  // Init map once
  if (!leafletMap) {
    leafletMap = L.map('map', { zoomControl: true }).setView([32, 108], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> &copy; <a href="https://carto.com">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 18
    }).addTo(leafletMap);
    markerLayer = L.layerGroup().addTo(leafletMap);
  } else {
    leafletMap.invalidateSize();
  }

  markerLayer.clearLayers();

  // Group by city
  const byCity = {};
  filtered.forEach(m => {
    if (!byCity[m.city]) byCity[m.city] = [];
    byCity[m.city].push(m);
  });

  const noCoords = [];

  for (const [city, items] of Object.entries(byCity)) {
    const coords = CITY_COORDS[city];
    if (!coords) { noCoords.push(city); continue; }

    const hasVisit     = items.some(m => getVisit(m.id));
    const hasContacted = items.some(m => isContacted(m.id));
    const pinColor = hasVisit ? '#4caf82' : hasContacted ? '#f7d14f' : '#4f8ef7';
    const pinBorder = hasVisit ? '#2e6040' : hasContacted ? '#806c1a' : '#2e4080';

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:${pinColor};color:#fff;
        width:30px;height:30px;border-radius:50%;
        display:flex;align-items:center;justify-content:center;
        font-weight:800;font-size:13px;
        border:2px solid ${pinBorder};
        box-shadow:0 2px 10px rgba(0,0,0,.55);
        cursor:pointer;
      ">${items.length}</div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 15],
      popupAnchor: [0, -18]
    });

    const popupHtml = `
      <div style="min-width:230px;max-width:310px;">
        <div class="map-popup-city">🏙️ ${city}${items[0]?.province ? ' · ' + items[0].province : ''}</div>
        ${items.map(m => {
          const v = getVisit(m.id);
          const statusColor = v ? '#4caf82' : isContacted(m.id) ? '#f7d14f' : '#4f8ef7';
          return `<div class="map-popup-mfr">
            <div class="map-popup-name">${m.name}${m.goldSupplier ? ' ⭐' : ''}</div>
            <div class="map-popup-cat">${CATEGORY_ICONS[m.category]||'📦'} ${m.category}</div>
            <div class="map-popup-row">
              ${m.moq ? `<span class="map-popup-badge" style="background:#1e3d2a;color:#6fd4a1;border:1px solid #2e6040;">MOQ: ${m.moq}</span>` : ''}
              ${m.priceRange ? `<span class="map-popup-badge" style="background:#3d2a1e;color:#f4b06d;border:1px solid #80502e;">💰 ${m.priceRange}</span>` : ''}
              ${v ? `<span class="map-popup-badge" style="background:#1a3d2a;color:#4caf82;border:1px solid #2e6040;">📅 ${formatVisitDate(v.date)}</span>` : ''}
              <span style="font-size:10px;font-weight:600;color:${statusColor};margin-left:auto;">● ${v ? 'Scheduled' : isContacted(m.id) ? 'Contacted' : 'New'}</span>
            </div>
            ${m.alibabaUrl ? `<div style="margin-top:5px;"><a class="map-popup-link" href="${m.alibabaUrl}" target="_blank">View on Alibaba ↗</a></div>` : ''}
          </div>`;
        }).join('')}
      </div>`;

    L.marker(coords, { icon })
      .bindPopup(popupHtml, { maxWidth: 340, minWidth: 240 })
      .addTo(markerLayer);
  }

  // Show warning for cities with no coordinates
  const warn = document.getElementById('map-no-coords-warn');
  if (noCoords.length > 0) {
    const msg = `📍 No map coordinates for: ${noCoords.join(', ')}`;
    if (warn) { warn.textContent = msg; warn.style.display = 'block'; }
  } else {
    if (warn) warn.style.display = 'none';
  }
}

function renderCityView(filtered, container) {
  const byRegion = {};
  for (const [region, cities] of Object.entries(allData.cityRegions)) {
    for (const city of cities) {
      const items = filtered.filter(m => m.city === city);
      if (!items.length) continue;
      if (!byRegion[region]) byRegion[region] = {};
      byRegion[region][city] = items;
    }
  }
  const allKnownCities = Object.values(allData.cityRegions).flat();
  [...new Set(filtered.filter(m => !allKnownCities.includes(m.city)).map(m => m.city))].forEach(city => {
    const items = filtered.filter(m => m.city === city);
    if (!byRegion['Other']) byRegion['Other'] = {};
    byRegion['Other'][city] = items;
  });

  let html = '';
  const citiesWithData = [...new Set(allData.manufacturers.map(m => m.city))];
  html += `<div class="itinerary-bar">
    <div class="icon">✈️</div>
    <div>
      <h3>Trip planning tip</h3>
      <p>You have manufacturers in <strong>${citiesWithData.length} cities</strong>. Group nearby cities to minimize travel. Pearl River Delta (Guangzhou–Dongguan–Shenzhen) can be done in 2–3 days by car.</p>
    </div>
  </div>`;

  for (const [region, cities] of Object.entries(byRegion)) {
    if (!Object.keys(cities).length) continue;
    html += `<div class="city-region"><div class="region-header">📍 ${region}</div><div class="city-grid">`;
    for (const [city, items] of Object.entries(cities)) {
      const cats = [...new Set(items.map(m => m.category))];
      html += `<div class="city-block">
        <div class="city-header" onclick="toggleCity(this)">
          <span style="font-size:18px">🏙️</span>
          <span class="city-name">${city}</span>
          <div class="city-cats">${cats.map(c => `<span class="cat-chip">${CATEGORY_ICONS[c]||'📦'} ${c}</span>`).join('')}</div>
          <span class="city-count">${items.length}</span>
        </div>
        <div class="mfr-list">${items.map(m => mfrCardHtml(m)).join('')}</div>
      </div>`;
    }
    html += `</div></div>`;
  }
  container.innerHTML = html;
}

function renderCategoryView(filtered, container) {
  const byCat = {};
  allData.categories.forEach(c => byCat[c] = []);
  filtered.forEach(m => { if (!byCat[m.category]) byCat[m.category] = []; byCat[m.category].push(m); });
  let html = '';
  for (const [cat, items] of Object.entries(byCat)) {
    if (!items.length) continue;
    const icon = CATEGORY_ICONS[cat] || '📦';
    html += `<div class="cat-section">
      <div class="cat-section-header">
        <span class="cat-icon">${icon}</span>
        <span class="cat-title">${cat}</span>
        <div class="cat-divider"></div>
        <span class="cat-count">${items.length} manufacturer${items.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="cat-grid">
        ${items.map(m => `<div class="cat-card">
          <div class="city-label">📍 ${m.city}${m.province ? ', ' + m.province : ''}</div>
          ${mfrCardHtml(m, true)}
        </div>`).join('')}
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

function mfrCardHtml(m, inCatView = false) {
  const contacted = isContacted(m.id);
  const deleted   = isDeleted(m.id);
  const visit     = getVisit(m.id);

  const effectiveStatus = visit ? 'scheduled' : contacted ? 'contacted' : m.status;
  const statusColors = { new: '#4f8ef7', contacted: '#f7d14f', scheduled: '#4caf82', rejected: '#f76d6d' };
  const statusColor = statusColors[effectiveStatus] || '#4f8ef7';
  const statusText  = visit ? 'Visit Scheduled' : (contacted ? 'Contacted' : (STATUS_LABELS[m.status] || 'New'));

  const visitBadge = visit
    ? `<div class="visit-badge">📅 ${formatVisitDate(visit.date)} ${visit.start}–${visit.end}</div>`
    : '';

  const scheduleBtn = visit
    ? `<button class="btn-schedule has-event" onclick="openScheduleModal('${m.id}')">📅 Edit visit</button>`
    : `<button class="btn-schedule" onclick="openScheduleModal('${m.id}')">📅 Schedule visit</button>`;

  return `<div class="mfr-card${deleted ? ' is-deleted' : ''}${visit ? ' has-visit' : ''}" data-mfr-id="${m.id}">
    <div class="mfr-top">
      <div>
        <div class="mfr-name">
          <span class="status-dot ${effectiveStatus}"></span>${m.name}
          ${m.goldSupplier ? '⭐' : ''}
        </div>
        ${!inCatView && m.province ? `<div style="font-size:12px;color:var(--muted);margin-top:2px;">📍 ${m.city}, ${m.province}</div>` : ''}
        <button class="btn-readmore" onclick="toggleDetails('${m.id}', this)">▼ Show details</button>
        <div class="mfr-details" id="details-${m.id}">
          <div class="mfr-meta">
            <span class="badge badge-cat">${CATEGORY_ICONS[m.category]||'📦'} ${m.category}</span>
            ${m.moq ? `<span class="badge badge-moq">MOQ: ${m.moq}</span>` : ''}
            ${m.priceRange ? `<span class="badge badge-price">💰 ${m.priceRange}</span>` : ''}
            ${m.goldSupplier ? `<span class="badge badge-gold">⭐ Gold Supplier</span>` : ''}
          </div>
          ${m.products ? `<div style="font-size:12px;color:var(--muted);margin-top:6px;">Products: ${m.products}</div>` : ''}
          ${m.notes ? `<div class="mfr-notes">${m.notes}</div>` : ''}
          ${visitBadge}
        </div>
      </div>
      <div class="mfr-links">
        ${m.alibabaUrl ? `<a class="btn-link" href="${m.alibabaUrl}" target="_blank">Alibaba ↗</a>` : ''}
        ${m.website ? `<a class="btn-link" href="${m.website}" target="_blank">Website ↗</a>` : ''}
      </div>
    </div>
    <div class="mfr-bottom-actions">
      <span class="status-inline-label" style="font-size:11px;color:${statusColor};font-weight:600;">${statusText}</span>
      <button class="btn-contact ${contacted ? 'is-contacted' : 'not-contacted'}" onclick="toggleContacted('${m.id}')">
        ${contacted ? '✓ Contacted' : '✉ Mark contacted'}
      </button>
      ${scheduleBtn}
      ${deleted
        ? `<button class="btn-restore" onclick="toggleDelete('${m.id}')">↩ Restore</button>`
        : `<button class="btn-delete" onclick="toggleDelete('${m.id}')">✕ Delete</button>`}
    </div>
  </div>`;
}

function formatVisitDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function toggleDetails(id, btn) {
  const details = document.getElementById('details-' + id);
  if (!details) return;
  const open = details.classList.toggle('open');
  btn.textContent = open ? '▲ Hide details' : '▼ Show details';
}

function toggleCity(header) {
  header.parentElement.classList.toggle('collapsed');
}

loadData();
</script>
